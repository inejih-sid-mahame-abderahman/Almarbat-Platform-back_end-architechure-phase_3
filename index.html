let currentPhaseFilter = "all";

function renderFilters() {
    const container = document.getElementById("phaseFilterButtons");
    container.innerHTML = `
        <button onclick="setPhaseFilter('all')" class="px-6 py-3 rounded-full font-bold transition-all ${currentPhaseFilter==='all' ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}">
            جميع الشاشات (${screensDB.length})
        </button>
        ${phasesMeta.map(p => `
            <button onclick="setPhaseFilter('${p.key}')" class="px-6 py-3 rounded-full font-bold transition-all ${currentPhaseFilter===p.key ? 'bg-emerald-700 text-white shadow-lg' : 'bg-white border text-slate-700'}">
                ${p.name}
            </button>
        `).join('')}
    `;
}

function setPhaseFilter(phase) {
    currentPhaseFilter = phase;
    renderFilters();
    renderScreens();
}

function renderScreens() {
    let filtered = currentPhaseFilter === "all" ? screensDB : screensDB.filter(s => s.phase === currentPhaseFilter);
    const container = document.getElementById("screensContainer");

    if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center p-20 text-slate-500">لا توجد شاشات في هذا الفلتر</div>`;
        return;
    }

    const grouped = {};
    filtered.forEach(s => {
        if (!grouped[s.phase]) grouped[s.phase] = [];
        grouped[s.phase].push(s);
    });

    let html = '';
    phasesMeta.forEach(phaseInfo => {
        const group = grouped[phaseInfo.key];
        if (!group || group.length === 0) return;

        html += `
            <div class="mb-16">
                <div class="phase-header pr-6 mb-6 p-5 rounded-2xl">
                    <h2 class="text-2xl font-black flex items-center gap-4">
                        <i class="fa-solid ${phaseInfo.icon} text-3xl text-emerald-600"></i>
                        ${phaseInfo.name} <span class="text-emerald-600">(${group.length})</span>
                    </h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        `;

        group.forEach(screen => {
            html += `
                <div class="screen-card bg-white rounded-3xl overflow-hidden shadow" onclick='showTechModal(${JSON.stringify(screen).replace(/'/g, "&#39;")})'>
                    <img src="${screen.src}" class="w-full aspect-[9/19] object-cover" alt="${screen.title}" 
                         onerror="this.src='https://placehold.co/300x570/2d3748/ffffff?text=${encodeURIComponent(screen.title)}'">
                    <div class="p-5">
                        <h3 class="font-bold text-lg leading-tight">${screen.title}</h3>
                        <p class="text-sm text-slate-600 mt-2 line-clamp-3">${screen.desc}</p>
                    </div>
                </div>
            `;
        });

        html += `</div></div>`;
    });

    container.innerHTML = html;
}

window.showTechModal = function(screen) {
    document.getElementById("modalTitle").innerText = screen.title;
    document.getElementById("modalImg").src = screen.src;
    document.getElementById("modalDesc").innerText = screen.desc;

    const phaseObj = phasesMeta.find(p => p.key === screen.phase);
    document.getElementById("modalPhaseTag").innerHTML = `<i class="fa-solid ${phaseObj?.icon || 'fa-circle'}"></i> ${phaseObj?.name || screen.phase}`;

    let apisHTML = '';
    if (screen.apis && screen.apis.length > 0) {
        apisHTML = screen.apis.map(api => `
            <div class="flex gap-3 items-start">
                <span class="badge-${api.method.toLowerCase()} text-white text-xs font-bold px-3 py-1 rounded">${api.method}</span>
                <div>
                    <code class="text-emerald-600 font-medium">/api/v1${api.path}</code>
                    <p class="text-xs text-slate-500 mt-1">${api.desc}</p>
                </div>
            </div>
        `).join('');
    } else {
        apisHTML = '<p class="text-slate-400">لم يتم تحديد APIs بعد</p>';
    }
    document.getElementById("modalApis").innerHTML = apisHTML;

    document.getElementById("modalModels").innerHTML = (screen.models || []).map(m => 
        `<span class="bg-emerald-100 text-emerald-800 px-4 py-1.5 rounded-2xl text-sm">${m}</span>`
    ).join('');

    document.getElementById("modalFlow").innerText = screen.flow || "تدفق البيانات يتم تحديده حسب المتطلبات النهائية";

    const modal = document.getElementById("techModal");
    modal.classList.remove("hidden");
    modal.style.display = "flex";
};

window.closeTechModal = function() {
    const modal = document.getElementById("techModal");
    modal.style.display = "none";
    modal.classList.add("hidden");
};

function init() {
    renderFilters();
    renderScreens();
}

init();
</script>
